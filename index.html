<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cycle">
<meta name="theme-color" content="#f5c2c7">
<link rel="manifest" href="manifest.json">
<title>Cycle — Period Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f5c2c7;
    --blush-deep: #e8a0a9;
    --blush-light: #fdf0f2;
    --rose: #c97b84;
    --rose-dark: #a05060;
    --petal: #fae8ea;
    --sage: #b5c4b1;
    --lavender: #d4c5e2;
    --gold: #e8c98a;
    --text: #3d2a2d;
    --text-muted: #9a7478;
    --white: #fffbfc;
    --card: rgba(255,251,252,0.85);
    --shadow: 0 4px 24px rgba(180,100,110,0.10);
    --shadow-hover: 0 8px 36px rgba(180,100,110,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #fdf0f2 0%, #fae8ea 30%, #f5e6f0 60%, #ede8f5 100%);
    min-height: 100vh;
    color: var(--text);
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -15%;
    width: 60vw;
    height: 60vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,194,199,0.3) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -10%;
    left: -10%;
    width: 40vw;
    height: 40vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,197,226,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 120px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 24px 24px;
    text-align: center;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--rose-dark);
    line-height: 1;
  }

  header h1 span {
    display: block;
    font-style: italic;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    margin: 0 24px 24px;
    background: rgba(255,255,255,0.5);
    border-radius: 16px;
    padding: 4px;
    gap: 2px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(245,194,199,0.4);
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    background: transparent;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.05em;
  }

  .tab.active {
    background: var(--white);
    color: var(--rose-dark);
    font-weight: 500;
    box-shadow: 0 2px 12px rgba(180,100,110,0.12);
  }

  /* CARDS */
  .card {
    margin: 0 24px 16px;
    background: var(--card);
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(245,194,199,0.3);
    backdrop-filter: blur(12px);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* STATUS CARD */
  .status-card {
    background: linear-gradient(135deg, rgba(201,123,132,0.15) 0%, rgba(212,197,226,0.15) 100%);
    border: 1px solid rgba(201,123,132,0.25);
    text-align: center;
    padding: 32px 24px;
  }

  .cycle-day-ring {
    width: 120px;
    height: 120px;
    margin: 0 auto 20px;
    position: relative;
  }

  .cycle-day-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: rgba(245,194,199,0.3); stroke-width: 8; }
  .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--rose-dark);
    line-height: 1;
  }

  .ring-sublabel {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 400;
  }

  .status-phase {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    font-style: italic;
    color: var(--rose-dark);
    margin-bottom: 6px;
  }

  .status-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 280px;
    margin: 0 auto 20px;
  }

  .next-period-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--blush), var(--blush-deep));
    color: var(--rose-dark);
    font-size: 0.8rem;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 100px;
    letter-spacing: 0.02em;
  }

  /* PHASE BAR */
  .phase-bar-wrap {
    padding: 20px 24px;
  }

  .phase-bar {
    display: flex;
    height: 10px;
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 12px;
    gap: 2px;
  }

  .phase-seg {
    flex: 1;
    border-radius: 100px;
    transition: flex 0.4s ease;
    position: relative;
  }

  .phase-seg.menstrual { background: linear-gradient(90deg, #e8a0a9, #c97b84); flex: 0.2; }
  .phase-seg.follicular { background: linear-gradient(90deg, #f5d5a0, #e8c98a); flex: 0.35; }
  .phase-seg.ovulation { background: linear-gradient(90deg, #b5c4b1, #8fb38a); flex: 0.1; }
  .phase-seg.luteal { background: linear-gradient(90deg, #d4c5e2, #b8a5d0); flex: 0.35; }

  .phase-labels {
    display: flex;
    justify-content: space-between;
  }

  .phase-label-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .phase-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .phase-dot.menstrual { background: #c97b84; }
  .phase-dot.follicular { background: #e8c98a; }
  .phase-dot.ovulation { background: #8fb38a; }
  .phase-dot.luteal { background: #b8a5d0; }

  .phase-label-item.current {
    color: var(--rose-dark);
    font-weight: 500;
  }

  /* MINI CALENDAR */
  .mini-cal {
    margin-bottom: 8px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--text);
  }

  .cal-nav {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.2s;
    line-height: 1;
  }

  .cal-nav:hover { background: rgba(245,194,199,0.3); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-day-label {
    text-align: center;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 0 6px;
    font-weight: 500;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    color: var(--text);
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  .cal-day:hover:not(.empty):not(.other-month) { background: rgba(245,194,199,0.4); }
  .cal-day.other-month { color: rgba(61,42,45,0.25); cursor: default; }
  .cal-day.today { font-weight: 600; }

  .cal-day.today::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--rose);
    border-radius: 50%;
  }

  .cal-day.period-day { background: rgba(201,123,132,0.2); color: var(--rose-dark); font-weight: 500; }
  .cal-day.period-start { background: var(--rose); color: white; font-weight: 600; }
  .cal-day.period-end { background: rgba(201,123,132,0.35); color: var(--rose-dark); font-weight: 500; }
  .cal-day.predicted { background: rgba(245,194,199,0.35); }
  .cal-day.predicted::before { content: ''; position: absolute; inset: 3px; border: 1.5px dashed rgba(201,123,132,0.5); border-radius: 50%; }
  .cal-day.follicular-day { background: rgba(232,201,138,0.15); }
  .cal-day.ovulation-day { background: rgba(143,179,138,0.2); color: #4a7a45; font-weight: 500; }
  .cal-day.ovulation-day::before { content: '◇'; position: absolute; top: 0; right: 1px; font-size: 6px; color: #4a7a45; }
  .cal-day.luteal-day { background: rgba(184,165,208,0.15); }

  /* LOG FORM */
  .form-row {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid rgba(245,194,199,0.5);
    border-radius: 12px;
    background: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .form-input:focus {
    border-color: var(--blush-deep);
    box-shadow: 0 0 0 3px rgba(232,160,169,0.15);
  }

  .flow-buttons {
    display: flex;
    gap: 8px;
  }

  .flow-btn {
    flex: 1;
    padding: 10px 6px;
    border: 1.5px solid rgba(245,194,199,0.5);
    border-radius: 12px;
    background: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .flow-btn .flow-icon { font-size: 1.1rem; }
  .flow-btn:hover { border-color: var(--blush-deep); background: rgba(245,194,199,0.15); }
  .flow-btn.selected { border-color: var(--rose); background: rgba(201,123,132,0.12); color: var(--rose-dark); font-weight: 500; }

  .symptom-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .symptom-chip {
    padding: 7px 14px;
    border: 1.5px solid rgba(245,194,199,0.5);
    border-radius: 100px;
    background: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .symptom-chip:hover { border-color: var(--blush-deep); }
  .symptom-chip.selected { background: rgba(201,123,132,0.12); border-color: var(--rose); color: var(--rose-dark); font-weight: 500; }

  .form-textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid rgba(245,194,199,0.5);
    border-radius: 12px;
    background: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    resize: none;
    height: 80px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-textarea:focus {
    border-color: var(--blush-deep);
    box-shadow: 0 0 0 3px rgba(232,160,169,0.15);
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(160,80,96,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(160,80,96,0.4);
  }

  .btn-primary:active { transform: translateY(0); }

  /* HISTORY */
  .history-item {
    padding: 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(245,194,199,0.3);
    margin-bottom: 10px;
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .history-dot {
    width: 10px;
    height: 10px;
    background: var(--rose);
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .history-dates {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--rose-dark);
    font-weight: 400;
    margin-bottom: 4px;
  }

  .history-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .history-delete {
    margin-left: auto;
    background: none;
    border: none;
    color: rgba(154,116,120,0.4);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 0 0 8px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .history-delete:hover { color: var(--rose); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }

  .empty-state .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--rose-dark);
    color: white;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* SECTION HIDDEN */
  .section { display: none; }
  .section.active { display: block; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 0 24px 16px;
  }

  .stat-card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid rgba(245,194,199,0.3);
    backdrop-filter: blur(12px);
    animation: fadeUp 0.4s ease both;
  }

  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--rose-dark);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Adjust for card animation delays */
  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.1s; }
  .stat-card:nth-child(2) { animation-delay: 0.05s; }
  .stat-card:nth-child(3) { animation-delay: 0.1s; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>cycle<span>your body, simply</span></h1>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('home')">Today</button>
    <button class="tab" onclick="switchTab('log')">Log</button>
    <button class="tab" onclick="switchTab('calendar')">Calendar</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <!-- HOME TAB -->
  <div id="tab-home" class="section active">
    <div class="card status-card">
      <div class="card-label">Your Cycle</div>
      <div class="cycle-day-ring" id="ring-container">
        <svg viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52"/>
          <circle class="ring-fill" id="ring-path" cx="60" cy="60" r="52"
            stroke-dasharray="326.7"
            stroke-dashoffset="326.7"/>
        </svg>
        <div class="ring-center">
          <div class="ring-day" id="ring-day">—</div>
          <div class="ring-sublabel">day</div>
        </div>
      </div>
      <div class="status-phase" id="home-phase">—</div>
      <div class="status-desc" id="home-desc">Log your first period to begin tracking your cycle.</div>
      <div class="next-period-badge" id="home-next">Add a period to predict your next</div>
    </div>

    <div class="card" style="padding:16px 24px;">
      <div class="card-label" style="margin-bottom:12px;">Cycle Phases</div>
      <div class="phase-bar">
        <div class="phase-seg menstrual" id="bar-menstrual"></div>
        <div class="phase-seg follicular" id="bar-follicular"></div>
        <div class="phase-seg ovulation" id="bar-ovulation"></div>
        <div class="phase-seg luteal" id="bar-luteal"></div>
      </div>
      <div class="phase-labels">
        <div class="phase-label-item" id="label-menstrual">
          <div class="phase-dot menstrual"></div>Menstrual
        </div>
        <div class="phase-label-item" id="label-follicular">
          <div class="phase-dot follicular"></div>Follicular
        </div>
        <div class="phase-label-item" id="label-ovulation">
          <div class="phase-dot ovulation"></div>Ovulation
        </div>
        <div class="phase-label-item" id="label-luteal">
          <div class="phase-dot luteal"></div>Luteal
        </div>
      </div>
    </div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" class="section">
    <div class="card">
      <div class="card-label">Log a Period</div>

      <div class="form-row">
        <label class="form-label">Start Date</label>
        <input type="date" class="form-input" id="log-start" />
      </div>

      <div class="form-row">
        <label class="form-label">End Date <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="date" class="form-input" id="log-end" />
      </div>

      <div class="form-row">
        <label class="form-label">Flow Intensity</label>
        <div class="flow-buttons">
          <button class="flow-btn" data-flow="spotting" onclick="selectFlow(this)">
            <span class="flow-icon">·</span>Spotting
          </button>
          <button class="flow-btn" data-flow="light" onclick="selectFlow(this)">
            <span class="flow-icon">◦</span>Light
          </button>
          <button class="flow-btn" data-flow="medium" onclick="selectFlow(this)">
            <span class="flow-icon">○</span>Medium
          </button>
          <button class="flow-btn" data-flow="heavy" onclick="selectFlow(this)">
            <span class="flow-icon">●</span>Heavy
          </button>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label">Symptoms</label>
        <div class="symptom-grid">
          <button class="symptom-chip" onclick="toggleSymptom(this)">Cramps</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Bloating</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Headache</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Fatigue</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Mood changes</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Back pain</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Tender breasts</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Nausea</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Acne</button>
          <button class="symptom-chip" onclick="toggleSymptom(this)">Insomnia</button>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="log-notes" placeholder="Anything else to remember…"></textarea>
      </div>

      <button class="btn-primary" onclick="savePeriod()">Save Period</button>
    </div>
  </div>

  <!-- CALENDAR TAB -->
  <div id="tab-calendar" class="section">
    <div class="card">
      <div class="mini-cal">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <div class="cal-month" id="cal-month-label"></div>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <div style="margin-top:16px; padding-top:16px; border-top:1px solid rgba(245,194,199,0.3);">
        <div class="phase-labels" style="flex-wrap:wrap;gap:8px;">
          <div class="phase-label-item"><div class="phase-dot menstrual"></div>Period</div>
          <div class="phase-label-item" style="gap:5px;"><div style="width:7px;height:7px;border-radius:50%;background:rgba(245,194,199,0.5);border:1.5px dashed rgba(201,123,132,0.5);"></div>Predicted</div>
          <div class="phase-label-item"><div class="phase-dot follicular"></div>Follicular</div>
          <div class="phase-label-item"><div class="phase-dot ovulation"></div>Ovulation</div>
          <div class="phase-label-item"><div class="phase-dot luteal"></div>Luteal</div>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="section">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-avg-cycle">—</div>
        <div class="stat-label">Avg cycle</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-avg-duration">—</div>
        <div class="stat-label">Avg length</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-label">Periods logged</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label" style="margin-bottom:16px;">Period History</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let periods = JSON.parse(localStorage.getItem('cycle-periods') || '[]');
let selectedFlow = null;
let selectedSymptoms = [];
let calViewDate = new Date();
const CYCLE_LENGTH = 28;
const PERIOD_LENGTH = 5;

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'home') updateHome();
  if (tab === 'calendar') renderCalendar();
  if (tab === 'history') renderHistory();
}

// ─── SAVE DATA ────────────────────────────────────────────────────────────────
function savePeriods() {
  localStorage.setItem('cycle-periods', JSON.stringify(periods));
}

// ─── FORM INTERACTIONS ────────────────────────────────────────────────────────
function selectFlow(btn) {
  document.querySelectorAll('.flow-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedFlow = btn.dataset.flow;
}

function toggleSymptom(btn) {
  btn.classList.toggle('selected');
  const s = btn.textContent;
  if (selectedSymptoms.includes(s)) selectedSymptoms = selectedSymptoms.filter(x => x !== s);
  else selectedSymptoms.push(s);
}

function savePeriod() {
  const start = document.getElementById('log-start').value;
  if (!start) { showToast('Please enter a start date'); return; }

  const end = document.getElementById('log-end').value;
  const notes = document.getElementById('log-notes').value;

  // Check for duplicate
  const exists = periods.find(p => p.start === start);
  if (exists) {
    // Update it
    exists.end = end || null;
    exists.flow = selectedFlow;
    exists.symptoms = [...selectedSymptoms];
    exists.notes = notes;
    showToast('Period updated ✓');
  } else {
    periods.push({
      id: Date.now(),
      start,
      end: end || null,
      flow: selectedFlow,
      symptoms: [...selectedSymptoms],
      notes
    });
    showToast('Period saved ✓');
  }

  periods.sort((a, b) => new Date(b.start) - new Date(a.start));
  savePeriods();

  // Reset form
  document.getElementById('log-start').value = '';
  document.getElementById('log-end').value = '';
  document.getElementById('log-notes').value = '';
  document.querySelectorAll('.flow-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.symptom-chip').forEach(b => b.classList.remove('selected'));
  selectedFlow = null;
  selectedSymptoms = [];

  updateHome();
}

function deletePeriod(id) {
  periods = periods.filter(p => p.id !== id);
  savePeriods();
  renderHistory();
  updateHome();
}

// ─── CYCLE CALCULATIONS ───────────────────────────────────────────────────────
function getLatestPeriod() {
  if (!periods.length) return null;
  return periods[0]; // already sorted desc
}

function getCycleLength() {
  if (periods.length < 2) return CYCLE_LENGTH;
  // Sort ascending to calculate gaps between consecutive periods
  const sorted = [...periods].sort((a, b) => new Date(a.start) - new Date(b.start));
  const lengths = [];
  for (let i = 1; i < sorted.length; i++) {
    const a = new Date(sorted[i].start);
    const b = new Date(sorted[i - 1].start);
    const diff = Math.round((a - b) / 86400000);
    if (diff > 15 && diff < 50) lengths.push(diff);
  }
  if (!lengths.length) return CYCLE_LENGTH;
  // Use only the 6 most recent gaps
  const recent = lengths.slice(-6);
  return Math.round(recent.reduce((a, b) => a + b, 0) / recent.length);
}

function getAvgDuration() {
  const withEnd = periods.filter(p => p.end);
  if (!withEnd.length) return PERIOD_LENGTH;
  const durations = withEnd.map(p => {
    const d = Math.round((new Date(p.end) - new Date(p.start)) / 86400000) + 1;
    return d;
  });
  return Math.round(durations.reduce((a, b) => a + b, 0) / durations.length);
}

function getCurrentPhase(startDate, dayInCycle, cycleLen) {
  const duration = getAvgDuration();
  if (dayInCycle <= duration) return { phase: 'menstrual', name: 'Menstrual', desc: 'Your body is shedding the uterine lining. Rest and warmth can help ease discomfort.' };
  const follEnd = Math.round(cycleLen * 0.5);
  if (dayInCycle <= follEnd) return { phase: 'follicular', name: 'Follicular', desc: 'Estrogen is rising and energy returning. A great time for new projects and social connection.' };
  const ovEnd = follEnd + 3;
  if (dayInCycle <= ovEnd) return { phase: 'ovulation', name: 'Ovulation', desc: 'Peak fertility window. You may feel your most confident and energetic right now.' };
  return { phase: 'luteal', name: 'Luteal', desc: 'Progesterone rises as your body prepares. Energy may slow — honour that.' };
}

// ─── HOME UPDATE ──────────────────────────────────────────────────────────────
function updateHome() {
  const latest = getLatestPeriod();
  if (!latest) {
    document.getElementById('ring-day').textContent = '—';
    document.getElementById('home-phase').textContent = '—';
    document.getElementById('home-desc').textContent = 'Log your first period to begin tracking your cycle.';
    document.getElementById('home-next').textContent = 'Add a period to predict your next';
    document.getElementById('ring-path').style.strokeDashoffset = 326.7;
    document.getElementById('ring-path').style.stroke = '#e8a0a9';
    return;
  }

  const cycleLen = getCycleLength();
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(latest.start);
  start.setHours(0,0,0,0);
  const dayInCycle = Math.round((today - start) / 86400000) + 1;
  const clampedDay = Math.max(1, Math.min(dayInCycle, cycleLen));

  document.getElementById('ring-day').textContent = clampedDay;

  const phaseInfo = getCurrentPhase(start, clampedDay, cycleLen);
  document.getElementById('home-phase').textContent = phaseInfo.name;
  document.getElementById('home-desc').textContent = phaseInfo.desc;

  // Ring progress
  const progress = clampedDay / cycleLen;
  const dashoffset = 326.7 * (1 - progress);
  const ringPath = document.getElementById('ring-path');
  ringPath.style.strokeDashoffset = dashoffset;
  const phaseColors = { menstrual: '#c97b84', follicular: '#e8c98a', ovulation: '#8fb38a', luteal: '#b8a5d0' };
  ringPath.style.stroke = phaseColors[phaseInfo.phase];

  // Next period
  const nextDate = new Date(start);
  nextDate.setDate(nextDate.getDate() + cycleLen);
  const daysUntil = Math.round((nextDate - today) / 86400000);
  if (daysUntil < 0) {
    document.getElementById('home-next').textContent = 'Period may be late';
  } else if (daysUntil === 0) {
    document.getElementById('home-next').textContent = 'Period expected today';
  } else {
    document.getElementById('home-next').textContent = `Next period in ${daysUntil} day${daysUntil === 1 ? '' : 's'}`;
  }

  // Phase labels
  ['menstrual','follicular','ovulation','luteal'].forEach(p => {
    document.getElementById('label-' + p).classList.toggle('current', p === phaseInfo.phase);
  });
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
function changeMonth(dir) {
  calViewDate.setMonth(calViewDate.getMonth() + dir);
  renderCalendar();
}

function renderCalendar() {
  const year = calViewDate.getFullYear();
  const month = calViewDate.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = `${monthNames[month]} ${year}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  dayLabels.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  const cycleLen = getCycleLength();
  const periodDuration = getAvgDuration();

  // Build set of tagged dates
  const dateMap = {};

  // Mark actual period days
  periods.forEach(p => {
    const s = new Date(p.start); s.setHours(0,0,0,0);
    const e = p.end ? new Date(p.end) : new Date(s.getTime() + (periodDuration - 1) * 86400000);
    e.setHours(0,0,0,0);
    let cur = new Date(s);
    while (cur <= e) {
      const key = cur.toISOString().slice(0,10);
      dateMap[key] = cur.getTime() === s.getTime() ? 'period-start' : 'period-day';
      if (cur.getTime() === e.getTime() && cur.getTime() !== s.getTime()) dateMap[key] = 'period-end';
      cur.setDate(cur.getDate() + 1);
    }
  });

  // Mark predicted & phase days — only from most recent period forward
  const latest = getLatestPeriod();
  if (latest) {
    const latestStart = new Date(latest.start); latestStart.setHours(0,0,0,0);
    const today2 = new Date(); today2.setHours(0,0,0,0);

    // Mark current cycle phases (days after latest period that aren't already marked)
    for (let d = 0; d < cycleLen; d++) {
      const cur = new Date(latestStart); cur.setDate(cur.getDate() + d);
      const key = cur.toISOString().slice(0,10);
      if (dateMap[key]) continue;
      if (d < periodDuration) continue;
      const follEnd = Math.round(cycleLen * 0.5);
      if (d < follEnd) { dateMap[key] = 'follicular-day'; continue; }
      if (d < follEnd + 3) { dateMap[key] = 'ovulation-day'; continue; }
      dateMap[key] = 'luteal-day';
    }

    // Mark predicted future cycles (next 3 only, only future dates)
    for (let cycle = 1; cycle <= 3; cycle++) {
      const nextStart = new Date(latestStart);
      nextStart.setDate(nextStart.getDate() + cycleLen * cycle);
      // Only predict if this cycle starts in the future or current month
      if (nextStart < new Date(today2.getFullYear(), today2.getMonth() - 1, 1)) continue;
      for (let d = 0; d < cycleLen; d++) {
        const cur = new Date(nextStart); cur.setDate(cur.getDate() + d);
        const key = cur.toISOString().slice(0,10);
        if (dateMap[key]) continue;
        if (d < periodDuration) { dateMap[key] = 'predicted'; continue; }
        const follEnd = Math.round(cycleLen * 0.5);
        if (d < follEnd) { dateMap[key] = 'follicular-day'; continue; }
        if (d < follEnd + 3) { dateMap[key] = 'ovulation-day'; continue; }
        dateMap[key] = 'luteal-day';
      }
    }
  }

  // Blank cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('button');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('button');
    el.className = 'cal-day';
    el.textContent = d;

    const thisDate = new Date(year, month, d);
    thisDate.setHours(0,0,0,0);
    const key = thisDate.toISOString().slice(0,10);

    if (thisDate.getTime() === today.getTime()) el.classList.add('today');
    if (dateMap[key]) el.classList.add(dateMap[key]);

    // Click to pre-fill log
    el.addEventListener('click', () => {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      document.getElementById('log-start').value = dateStr;
      switchTabDirect('log');
    });

    grid.appendChild(el);
  }
}

function switchTabDirect(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab')[1].classList.add('active'); // log tab is index 1
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('history-list');

  // Stats
  const cycleLen = periods.length >= 2 ? getCycleLength() : null;
  const avgDur = getAvgDuration();
  document.getElementById('stat-avg-cycle').textContent = cycleLen ? cycleLen + 'd' : '—';
  document.getElementById('stat-avg-duration').textContent = avgDur + 'd';
  document.getElementById('stat-total').textContent = periods.length;

  if (!periods.length) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🌸</span><p>No periods logged yet.<br>Head to the Log tab to get started.</p></div>`;
    return;
  }

  list.innerHTML = periods.map(p => {
    const start = formatDate(p.start);
    const end = p.end ? ` → ${formatDate(p.end)}` : '';
    const dur = p.end ? `${Math.round((new Date(p.end) - new Date(p.start)) / 86400000) + 1}d` : '';
    const flow = p.flow ? `${p.flow} flow` : '';
    const meta = [dur, flow, ...(p.symptoms || [])].filter(Boolean).join(' · ');
    return `
      <div class="history-item">
        <div class="history-dot"></div>
        <div style="flex:1;min-width:0;">
          <div class="history-dates">${start}${end}</div>
          ${meta ? `<div class="history-meta">${meta}</div>` : ''}
          ${p.notes ? `<div class="history-meta" style="margin-top:4px;font-style:italic;">"${p.notes}"</div>` : ''}
        </div>
        <button class="history-delete" onclick="deletePeriod(${p.id})">✕</button>
      </div>
    `;
  }).join('');
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Set default date to today
const today = new Date();
const todayStr = today.toISOString().slice(0,10);
document.getElementById('log-start').value = todayStr;

updateHome();
</script>
</body>
</html>
